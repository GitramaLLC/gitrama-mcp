# ─────────────────────────────────────────────────────────────────────────────
# Gitrama MCP — CI Pipeline
# Runs on every push and PR to main.
# Validates: lint, import check, Docker build, tool count.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & syntax ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

  # ── 2. Import & tool registration check ─────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (no gitrama CLI needed for import check)
        run: pip install mcp>=1.2.0

      - name: Install gitrama-mcp editable
        run: pip install -e . --no-deps

      - name: Verify server imports cleanly
        run: python -c "from gitrama_mcp.server import mcp; print(f'✅ {len(mcp._tool_manager._tools)} tools registered')"

      - name: Verify entry point exists
        run: gitrama-mcp --help || true   # exits 0 (TTY detected) or shows help

  # ── 3. Docker build ─────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gitrama-mcp:ci .

      - name: Verify image starts
        run: |
          docker run --rm \
            -e GTR_MCP_TRANSPORT=sse \
            -e GTR_MCP_PORT=8765 \
            -d --name gtr-test \
            -p 8765:8765 \
            gitrama-mcp:ci
          sleep 5
          curl -f http://localhost:8765/health || echo "Health endpoint not yet live — expected during cold start"
          docker stop gtr-test || true

  # ── 4. PyPI publish (on version tag only) ───────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, smoke, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
